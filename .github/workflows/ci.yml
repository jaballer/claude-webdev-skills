name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  detect-stack:
    name: detect-stack script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile scripts (syntax check)
        run: python -m py_compile plugins/webdev/scripts/detect-stack

      - name: Regression suite
        run: bash evals/detect-stack/test-cases.sh

      - name: Smoke test (sample repo)
        run: bash evals/detect-stack/run-local.sh
